name: Deploy Ops Service

on:
  workflow_run:
    workflows: [Ops Service CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ops-service
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      REMOTE_HOST: ${{ secrets.SERVER_HOST }}
      REMOTE_USER: ${{ secrets.SERVER_USER }}
      REMOTE_TARGET: /var/www/dakang/ops
      OPS_ENV_FILE: ${{ secrets.OPS_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Setup SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Sync application files
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'data' \
            --exclude '.env' \
            --exclude 'logs' \
            --exclude 'run' \
            ./ "$REMOTE_USER@$REMOTE_HOST:$REMOTE_TARGET/"

      - name: Update runtime environment file
        if: env.OPS_ENV_FILE != ''
        run: |
          ssh "$REMOTE_USER@$REMOTE_HOST" "cat > '$REMOTE_TARGET/.env'" <<'EOF'
          $OPS_ENV_FILE
          EOF

      - name: Restart service
        run: |
          ssh "$REMOTE_USER@$REMOTE_HOST" "cd '$REMOTE_TARGET' && chmod +x scripts/restart-service.sh && ./scripts/restart-service.sh"
